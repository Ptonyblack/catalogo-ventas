<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos - Ventas Premium</title>
  <meta name="description" content="Catálogo de purés, vinagres y productos gourmet de alta calidad">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/firebase-init.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-container">
      <div class="logo">
        <span>CATÁLOGO DE PRODUCTOS</span>
      </div>
      <nav>
        <ul>
          <li><a href="#hero">Inicio</a></li>
          <li><a href="#products">Productos</a></li>
          <li><a href="#footer">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1>Productos Premium de Excelente Calidad</h1>
      <p>Purés artesanales, vinagres envejecidos y conservas gourmet</p>
      <button class="hero-btn" onclick="document.getElementById('products').scrollIntoView({behavior: 'smooth'})">
        Ver Catálogo
      </button>
    </div>

    <!-- CAROUSEL -->
    <div class="carousel-container">
      <div class="carousel" id="carousel">
        <!-- Se llena dinámicamente con JavaScript -->
      </div>
      <div class="carousel-controls">
        <button class="carousel-btn" onclick="prevSlide()">‹</button>
        <button class="carousel-btn" onclick="nextSlide()">›</button>
      </div>
      <div class="carousel-dots" id="carouselDots">
        <!-- Se llena dinámicamente con JavaScript -->
      </div>
    </div>
  </section>

  <!-- SECCION DE PRODUCTOS -->
  <section class="categories" id="products">
    <h2>Nuestros Productos</h2>
    
    <!-- Filtros por categoría -->
    <div class="category-filters">
      <!-- Se llena dinámicamente con JavaScript -->
    </div>

    <!-- Grid de productos -->
    <div class="products-grid">
      <!-- Se llena dinámicamente con JavaScript -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer id="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h3>Contacto</h3>
        <p>WhatsApp: <a href="https://wa.me/5351234567" target="_blank">+53 5 1234567</a></p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Catálogo de Ventas. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- MODAL DE COTIZACIÓN - REMOVIDO -->

  <script src="js/main.js"></script>

  <script>
    // Script para renderizar carousel dinámicamente
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        const carouselContainer = document.getElementById('carousel');
        const dotsContainer = document.getElementById('carouselDots');
        
        // Crear slides del carousel
        const carouselProducts = allProducts.slice(0, 5);
        carouselProducts.forEach((product, index) => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          slide.innerHTML = `
            <div class="slide-image"><img src="${product.imageUrl}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;"></div>
            <div class="slide-content">
              <h2>${product.name}</h2>
              <p>${product.description}</p>
              <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                <div>
                  <p style="font-size: 0.9rem; color: #666;">Precio USD</p>
                  <p style="font-size: 1.5rem; font-weight: bold; color: #2ecc71;">$${product.priceUSD.toFixed(2)}</p>
                </div>
                <div>
                  <p style="font-size: 0.9rem; color: #666;">Precio CUP</p>
                  <p style="font-size: 1.5rem; font-weight: bold; color: #2ecc71;">₱${product.priceCUP}</p>
                </div>
              </div>
            </div>
          `;
          carouselContainer.appendChild(slide);
          
          // Crear dots
          const dot = document.createElement('span');
          dot.className = `dot ${index === 0 ? 'active' : ''}`;
          dot.onclick = () => currentSlide(index);
          dotsContainer.appendChild(dot);
        });
      }, 500);
    });
  </script>

</body>
</html>
