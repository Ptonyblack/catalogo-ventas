<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpiar Firebase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #e74c3c;
      text-align: center;
    }
    .warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      color: #856404;
    }
    button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      margin: 1rem 0;
      transition: background 0.3s;
    }
    button:hover {
      background: #c0392b;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      font-weight: bold;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚠️ Limpiar Firebase</h1>
    
    <div class="warning">
      <strong>ADVERTENCIA:</strong> Esta acción eliminará TODOS los productos y categorías de Firebase. No se puede deshacer.
    </div>

    <div id="status"></div>

    <button id="cleanBtn" onclick="cleanFirebase()">
      🗑️ Eliminar TODO de Firebase
    </button>

    <button onclick="location.href='index.html'" style="background: #3498db;">
      ← Volver
    </button>
  </div>

  <script src="js/firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, set, remove } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    window.cleanFirebase = async function() {
      const statusDiv = document.getElementById('status');
      const cleanBtn = document.getElementById('cleanBtn');
      
      try {
        cleanBtn.disabled = true;
        statusDiv.innerHTML = '<div class="status info">Conectando a Firebase...</div>';

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Eliminar productos
        statusDiv.innerHTML = '<div class="status info">Eliminando productos...</div>';
        await remove(ref(db, 'productos'));
        console.log('✅ Productos eliminados');

        // Eliminar categorías
        statusDiv.innerHTML = '<div class="status info">Eliminando categorías...</div>';
        await remove(ref(db, 'categorias'));
        console.log('✅ Categorías eliminadas');

        // Eliminar diagnóstico
        statusDiv.innerHTML = '<div class="status info">Limpiando datos de diagnóstico...</div>';
        await remove(ref(db, 'diagnostico'));
        console.log('✅ Datos limpios');

        statusDiv.innerHTML = `
          <div class="status success">
            ✅ Firebase está completamente vacío.
            <br><br>
            Ahora puedes volver a admin.html y agregar nuevos productos.
          </div>
        `;

      } catch (error) {
        console.error('Error:', error);
        statusDiv.innerHTML = `
          <div class="status error">
            ❌ Error: ${error.message}
          </div>
        `;
        cleanBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
